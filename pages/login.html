<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Login to Notato</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
</head>
<body>
    <nav class="navbar navbar-dark navbar-expand-lg bg-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="/">Notato</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false"
                aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarSupportedContent">
                <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                    <li class="nav-item">
                        <a class="nav-link active" aria-current="page" href="/">Home</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/about">About</a>
                    </li>
                </ul>

                <div class="d-flex" role="search">
                    <a href="/login"><button class="btn btn-outline-primary mx-2" type="submit">Login</button></a>
                    <a href="/signup"><button class="btn btn-outline-primary mx-2" type="submit">Signup</button></a>
                </div>
            </div>
        </div>
    </nav>
    <div class="container">
        <h1 class="my-4">Welcome to the Login Page!</h1>
        <form id="loginForm">
            <div class="mb-3">
                <label for="email" class="form-label">Email address</label>
                <input type="email" class="form-control" id="email" aria-describedby="emailHelp" placeholder="Enter email" required>
                <small id="emailHelp" class="form-text text-muted">We'll never share your email with anyone else.</small>
            </div>
            <div class="mb-3">
                <label for="password" class="form-label">Password</label>
                <input type="password" class="form-control" id="password" placeholder="Password" required>
            </div>
            <button id="submit" type="submit" class="btn btn-primary">Login</button>
        </form>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
    <script>
        async function postData(url = '', data = {}) {
            const response = await fetch(url, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(data)
            });
            let rdata = await response.json();
            return rdata;
        }

        document.getElementById('loginForm').addEventListener('submit', async (event) => {
            event.preventDefault(); // Prevent the default form submission
            let email = document.getElementById('email').value;
            let password = document.getElementById('password').value;
            console.log("Submitting this data", email, password);
            let resp = await postData("/login", { email, password });
            console.log(resp);
            if (resp.success) {
                alert("You are now logged in");
                localStorage.setItem("user", JSON.stringify(resp.user));
                localStorage.setItem("token", resp.token); // Store the token in local storage
                console.log("Token stored in local storage:", localStorage.getItem("token")); // Log the token
                document.getElementById("email").value = "";
                document.getElementById("password").value = "";
                window.location.href = "/homepage"; // Redirect to authenticated homepage
            } else {
                alert("Login failed: " + resp.message);
            }
        });
    </script>
</body>
</html>
